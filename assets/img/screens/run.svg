    <rect x="26" y="248" width="708" height="42" rx="11" fill="#f5f7fc"/><circle cx="48" cy="269" r="4" fill="#2f4bd6"/><text x="66" y="274" fill="#0b0b28">tool.http_get  x4</text><text x="656" y="274" fill="#6b7089">1.3s</text>
    <rect x="26" y="298" width="708" height="42" rx="11" fill="#f5f7fc"/><circle cx="48" cy="319" r="4" fill="#2f4bd6"/><text x="66" y="324" fill="#0b0b28">model.summarize</text><text x="656" y="324" fill="#6b7089">1.9s</text>
    <rect x="26" y="348" width="708" height="42" rx="11" fill="#f5f7fc"/><circle cx="48" cy="369" r="4" fill="#2f4bd6"/><text x="66" y="374" fill="#0b0b28">policy.check  egress</text><text x="640" y="374" fill="#6b7089">18ms</text>
    <rect x="26" y="398" width="708" height="42" rx="11" fill="#eef8f1"/><path d="M40 415l5 5 9-9" stroke="#12b76a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="66" y="424" fill="#0b0b28">tool.publish  slack</text><text x="628" y="424" fill="#0a7a48">delivered</text>
  </g>
  <!-- report card -->
  <defs><linearGradient id="rep" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3d5afe"/><stop offset="1" stop-color="#1b2a8a"/></linearGradient></defs>
  <rect x="26" y="462" width="708" height="168" rx="16" fill="url(#rep)"/>
  <text x="50" y="502" fill="#fff" font-size="18" font-weight="700">Weekly performance</text>
  <text x="50" y="524" fill="#c7d2ff" font-size="12.5">Northwind . week of Jun 8</text>
  <text x="710" y="500" fill="#fff" font-size="30" font-weight="700" text-anchor="end">+23%</text>
  <text x="710" y="524" fill="#c7d2ff" font-size="11" text-anchor="end">paid signups w/w</text>
  <g fill="#ffffff" opacity=".26"><rect x="50" y="560" width="26" height="40" rx="4"/><rect x="86" y="548" width="26" height="52" rx="4"/><rect x="122" y="572" width="26" height="28" rx="4"/><rect x="158" y="540" width="26" height="60" rx="4"/><rect x="194" y="556" width="26" height="44" rx="4"/><rect x="230" y="530" width="26" height="70" rx="4"/><rect x="266" y="566" width="26" height="34" rx="4"/></g>
