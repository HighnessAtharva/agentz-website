    <rect x="26" y="800" width="708" height="40" rx="10" fill="#f5f7fc"/><text x="48" y="825" fill="#0b0b28">mon 12:30</text><text x="360" y="825" fill="#6b7089">5.4s . 5 spans</text><rect x="650" y="810" width="64" height="20" rx="10" fill="#e6ffef"/><text x="666" y="824" fill="#0a7a48" font-size="11">ok</text>
    <rect x="26" y="848" width="708" height="40" rx="10" fill="#f5f7fc"/><text x="48" y="873" fill="#0b0b28">sun 12:30</text><text x="360" y="873" fill="#6b7089">5.1s . 5 spans</text><rect x="650" y="858" width="64" height="20" rx="10" fill="#e6ffef"/><text x="666" y="872" fill="#0a7a48" font-size="11">ok</text>
    <rect x="26" y="896" width="708" height="40" rx="10" fill="#f5f7fc"/><text x="48" y="921" fill="#0b0b28">sat 12:30</text><text x="360" y="921" fill="#6b7089">4.9s . 5 spans</text><rect x="650" y="906" width="64" height="20" rx="10" fill="#e6ffef"/><text x="666" y="920" fill="#0a7a48" font-size="11">ok</text>
