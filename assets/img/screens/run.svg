  <text x="102" y="690" fill="#0b0b28" font-size="15" font-weight="600">Schedule set</text>
  <text x="102" y="714" fill="#6b7089" font-size="13" font-family="'JetBrains Mono',monospace">cron 0 30 0 * * *  .  next run in 14h  .  no redeploy</text>
