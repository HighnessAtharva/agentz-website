<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 940" font-family="'General Sans',system-ui,sans-serif">
  <rect width="760" height="940" rx="18" fill="#ffffff"/>
  <!-- top bar -->
  <rect x="0" y="0" width="760" height="58" rx="18" fill="#f5f7fc"/><rect x="0" y="44" width="760" height="14" fill="#f5f7fc"/>
  <rect x="26" y="20" width="18" height="18" rx="6" fill="#2f4bd6"/>
  <text x="54" y="34" fill="#0b0b28" font-size="15" font-weight="600">Compose a skill</text>
  <rect x="590" y="16" width="146" height="26" rx="13" fill="#e6ecff"/><text x="608" y="33" fill="#2f4bd6" font-size="11.5" font-weight="600" font-family="'JetBrains Mono',monospace">draft . versioned</text>
  <line x1="0" y1="58" x2="760" y2="58" stroke="#eceef4"/>
  <text x="26" y="98" fill="#8a90a6" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="1.5">WORKFLOW</text>
  <!-- vertical connectors -->
  <line x1="70" y1="150" x2="70" y2="232" stroke="#2f4bd6" stroke-width="2"/>
  <line x1="70" y1="284" x2="70" y2="366" stroke="#2f4bd6" stroke-width="2"/>
  <!-- step card 1 -->
  <rect x="26" y="116" width="708" height="72" rx="14" fill="#ffffff" stroke="#e2e6ef"/>
  <rect x="46" y="136" width="34" height="34" rx="9" fill="#e6ecff"/><rect x="56" y="146" width="14" height="14" rx="4" fill="none" stroke="#2f4bd6" stroke-width="1.8"/>
  <text x="98" y="147" fill="#0b0b28" font-size="15" font-weight="600">Collect</text>
  <text x="98" y="168" fill="#6b7089" font-size="12.5">4 sources . crawl new competitor pages</text>
  <rect x="662" y="140" width="52" height="24" rx="12" fill="#eef1f7"/><text x="674" y="156" fill="#6b7089" font-size="11" font-family="'JetBrains Mono',monospace">01</text>
  <!-- step card 2 -->
  <rect x="26" y="200" width="708" height="72" rx="14" fill="#ffffff" stroke="#e2e6ef"/>
  <rect x="46" y="220" width="34" height="34" rx="9" fill="#e6ecff"/><text x="55" y="242" fill="#2f4bd6" font-size="16" font-weight="700">S</text>
  <text x="98" y="231" fill="#0b0b28" font-size="15" font-weight="600">Summarize</text>
  <text x="98" y="252" fill="#6b7089" font-size="12.5">model . goal + done-check</text>
  <rect x="662" y="224" width="52" height="24" rx="12" fill="#eef1f7"/><text x="674" y="240" fill="#6b7089" font-size="11" font-family="'JetBrains Mono',monospace">02</text>
  <!-- step card 3 -->
  <rect x="26" y="284" width="708" height="72" rx="14" fill="#ffffff" stroke="#e2e6ef"/>
  <rect x="46" y="304" width="34" height="34" rx="9" fill="#eef1f7"/><path d="M55 327l10-10m0 0h-7m7 0v7" stroke="#0b0b28" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <text x="98" y="315" fill="#0b0b28" font-size="15" font-weight="600">Publish</text>
  <text x="98" y="336" fill="#6b7089" font-size="12.5">to Notion . weekly digest</text>
  <rect x="662" y="308" width="52" height="24" rx="12" fill="#eef1f7"/><text x="674" y="324" fill="#6b7089" font-size="11" font-family="'JetBrains Mono',monospace">03</text>
  <!-- describe the job -->
  <rect x="26" y="392" width="708" height="256" rx="16" fill="#f5f7fc" stroke="#e2e6ef"/>
  <text x="48" y="428" fill="#8a90a6" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="1.5">DESCRIBE THE JOB</text>
  <rect x="48" y="444" width="664" height="52" rx="12" fill="#ffffff" stroke="#e2e6ef"/>
  <text x="66" y="476" fill="#0b0b28" font-size="14">Summarize new competitor pages and post a weekly digest.</text>
  <rect x="48" y="512" width="176" height="30" rx="15" fill="#e6ecff"/><text x="68" y="531" fill="#2f4bd6" font-size="12.5" font-weight="600" font-family="'JetBrains Mono',monospace">skill written</text>
  <rect x="234" y="512" width="176" height="30" rx="15" fill="#eef1f7"/><text x="254" y="531" fill="#6b7089" font-size="12.5" font-family="'JetBrains Mono',monospace">3 steps wired</text>
  <line x1="48" y1="566" x2="712" y2="566" stroke="#e2e6ef"/>
  <text x="48" y="596" fill="#6b7089" font-size="13">Each step carries a goal and a done-check. Inputs stay templated.</text>
  <rect x="48" y="612" width="132" height="38" rx="10" fill="#2f4bd6"/><text x="78" y="636" fill="#fff" font-size="13" font-weight="600">Save skill</text>
  <!-- templated inputs -->
  <text x="26" y="700" fill="#8a90a6" font-size="12" font-family="'JetBrains Mono',monospace" letter-spacing="1.5">TEMPLATED INPUTS . 4</text>
  <g font-size="13">
    <rect x="26" y="716" width="708" height="44" rx="11" fill="#f5f7fc"/>
    <text x="48" y="743" fill="#0b0b28" font-family="'JetBrains Mono',monospace">source_urls</text><text x="360" y="743" fill="#6b7089">{{ competitors[] }}</text>
    <rect x="26" y="770" width="708" height="44" rx="11" fill="#f5f7fc"/>
    <text x="48" y="797" fill="#0b0b28" font-family="'JetBrains Mono',monospace">tone</text><text x="360" y="797" fill="#6b7089">concise . exec brief</text>
    <rect x="26" y="824" width="708" height="44" rx="11" fill="#f5f7fc"/>
    <text x="48" y="851" fill="#0b0b28" font-family="'JetBrains Mono',monospace">destination</text><text x="360" y="851" fill="#6b7089">notion://weekly-digest</text>
    <rect x="26" y="878" width="708" height="44" rx="11" fill="#eef8f1"/>
    <path d="M44 899l5 5 9-9" stroke="#12b76a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="70" y="905" fill="#0b0b28">wired . 3 steps . 0 errors</text><text x="360" y="905" fill="#0a7a48">ready to run</text>
  </g>
</svg>
