<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="'General Sans',system-ui,sans-serif">
  <rect width="1200" height="660" rx="16" fill="#ffffff"/>
  <!-- left rail -->
  <rect x="0" y="0" width="264" height="660" rx="16" fill="#f4f6fc"/>
  <rect x="248" y="0" width="16" height="660" fill="#f4f6fc"/>
  <rect x="24" y="28" width="20" height="20" rx="6" fill="#2f4bd6"/>
  <text x="54" y="43" fill="#0b0b28" font-size="15" font-weight="700">Workspace</text>
  <text x="24" y="92" fill="#8a90a6" font-size="11" font-family="'JetBrains Mono',monospace" letter-spacing="1">CHANNELS</text>
  <rect x="14" y="104" width="236" height="34" rx="9" fill="#e6ecff"/>
  <text x="30" y="126" fill="#2f4bd6" font-size="14" font-weight="600"># results</text>
  <g fill="#5b6178" font-size="14">
    <text x="30" y="164"># general</text>
    <text x="30" y="198"># finance</text>
    <text x="30" y="232"># eng</text>
    <text x="30" y="266"># growth</text>
    <text x="30" y="300"># support</text>
  </g>
  <g fill="#e4e7f0">
    <rect x="24" y="330" width="150" height="12" rx="6"/>
    <rect x="24" y="356" width="200" height="12" rx="6"/>
    <rect x="24" y="382" width="120" height="12" rx="6"/>
    <rect x="24" y="408" width="180" height="12" rx="6"/>
  </g>
  <!-- main header -->
  <text x="300" y="44" fill="#0b0b28" font-size="17" font-weight="700"># results</text>
  <line x1="288" y1="66" x2="1176" y2="66" stroke="#eceef4"/>
  <!-- message 1 -->
  <circle cx="312" cy="104" r="16" fill="#c9d3ea"/>
  <text x="340" y="100" fill="#0b0b28" font-size="14" font-weight="700">Maya Chen<tspan fill="#9aa0b4" font-weight="400" font-size="12">  8:01 AM</tspan></text>
  <rect x="340" y="112" width="60" height="18" rx="5" fill="#e6ecff"/><text x="350" y="125" fill="#2f4bd6" font-size="11.5" font-weight="600">@AgentZ</text>
  <text x="410" y="126" fill="#2b3048" font-size="14">pull the weekly numbers from Stripe, GA4, and HubSpot and post the recap.</text>
  <!-- message 2 -->
  <circle cx="312" cy="172" r="16" fill="#c9d3ea"/>
  <text x="340" y="168" fill="#0b0b28" font-size="14" font-weight="700">Jordan Ellis<tspan fill="#9aa0b4" font-weight="400" font-size="12">  8:02 AM</tspan></text>
  <text x="340" y="192" fill="#2b3048" font-size="14">flag anything that moved more than 10% week over week</text>
  <!-- agent message -->
  <rect x="296" y="220" width="34" height="34" rx="9" fill="#2f4bd6"/>
  <text x="305" y="243" fill="#fff" font-size="17" font-family="Georgia,serif" font-style="italic" font-weight="700">Z</text>
  <text x="340" y="234" fill="#0b0b28" font-size="14" font-weight="700">AgentZ<tspan fill="#2f4bd6" font-weight="600" font-size="10" dx="8">APP</tspan><tspan fill="#9aa0b4" font-weight="400" font-size="12" dx="8">8:06 AM</tspan></text>
  <text x="340" y="258" fill="#2b3048" font-size="14">Done. Revenue, signups, CAC, and pipeline in one view. Paid signups up 23%, refunds</text>
  <text x="340" y="278" fill="#2b3048" font-size="14">down. Want me to run this every Monday at 8?</text>
  <!-- report card -->
  <defs><linearGradient id="rep" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3d5afe"/><stop offset="1" stop-color="#1b2a8a"/></linearGradient></defs>
  <rect x="340" y="296" width="340" height="150" rx="14" fill="url(#rep)"/>
  <text x="362" y="332" fill="#fff" font-size="17" font-weight="700">Weekly performance</text>
  <text x="362" y="352" fill="#c7d2ff" font-size="12">Northwind . week of Jun 8</text>
  <text x="622" y="330" fill="#fff" font-size="26" font-weight="700" text-anchor="end">+23%</text>
  <text x="662" y="352" fill="#c7d2ff" font-size="10.5" text-anchor="end">paid signups w/w</text>
  <g fill="#ffffff" opacity=".28">
    <rect x="362" y="396" width="20" height="26" rx="3"/><rect x="390" y="386" width="20" height="36" rx="3"/><rect x="418" y="402" width="20" height="20" rx="3"/><rect x="446" y="378" width="20" height="44" rx="3"/><rect x="474" y="392" width="20" height="30" rx="3"/><rect x="502" y="370" width="20" height="52" rx="3"/><rect x="530" y="398" width="20" height="24" rx="3"/>
  </g>
  <rect x="340" y="446" width="340" height="1" fill="rgba(255,255,255,.25)"/>
  <text x="362" y="472" fill="#fff" font-size="13" font-weight="600">Weekly-Performance.pdf</text>
  <text x="362" y="490" fill="#c7d2ff" font-size="11">6 pages . PDF</text>
  <!-- reactions -->
  <rect x="340" y="512" width="52" height="26" rx="13" fill="#f0f2f8"/><text x="356" y="529" fill="#2b3048" font-size="12">+ 5</text>
  <rect x="400" y="512" width="52" height="26" rx="13" fill="#f0f2f8"/><text x="416" y="529" fill="#2b3048" font-size="12">100 2</text>
  <!-- reply -->
  <circle cx="312" cy="576" r="16" fill="#c9d3ea"/>
  <text x="340" y="572" fill="#0b0b28" font-size="14" font-weight="700">Maya Chen<tspan fill="#9aa0b4" font-weight="400" font-size="12">  8:09 AM</tspan></text>
  <text x="340" y="596" fill="#2b3048" font-size="14">yes please. this used to eat my whole Monday morning.</text>
</svg>
