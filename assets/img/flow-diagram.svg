    <rect x="820" y="378" width="118" height="26" rx="13" fill="#153a2c"/><text x="840" y="395" fill="#8fd9b6">Sigstore signed</text>
  </g>
  <g stroke="#8b8b85" stroke-width="1.4" fill="none" stroke-dasharray="3 5" opacity=".6">
    <path d="M115 308 v52"/><path d="M427 308 v52"/><path d="M637 308 v52"/><path d="M846 312 v48"/>
