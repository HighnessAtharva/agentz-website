  <!-- OBSERVABILITY BAR -->
  <rect x="40" y="360" width="920" height="72" rx="16" fill="#161613"/>
  <text x="64" y="392" fill="#ffffff" font-size="15" font-weight="700">Observability . Audit . Trace</text>
  <text x="64" y="414" fill="#a6a49a" font-size="12">every call stamped to a signed, tamper-evident trace underneath</text>
  <g font-size="11" font-weight="600">
