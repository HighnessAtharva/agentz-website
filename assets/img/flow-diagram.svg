    <rect x="432" y="164" width="120" height="58" rx="12" fill="#153a2c" stroke="#245c39"/><text x="448" y="190">workflows</text><text x="448" y="208" font-size="10.5" fill="#8fd9b6" font-weight="400">wired steps</text>
    <rect x="304" y="230" width="120" height="58" rx="12" fill="#153a2c" stroke="#245c39"/><text x="320" y="256">context</text><text x="320" y="274" font-size="10.5" fill="#8fd9b6" font-weight="400">memory + graph</text>
    <rect x="432" y="230" width="120" height="58" rx="12" fill="#153a2c" stroke="#245c39"/><text x="448" y="256">guardrails</text><text x="448" y="274" font-size="10.5" fill="#8fd9b6" font-weight="400">default deny</text>
  </g>
  <path d="M570 202 h30" stroke="#1a5c46" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- POLICY EDGE -->
  <rect x="604" y="96" width="66" height="212" rx="14" fill="#d7ede2" stroke="#a9d6c0"/>
  <rect x="624" y="176" width="26" height="22" rx="4" fill="none" stroke="#1a5c46" stroke-width="2"/>
  <path d="M630 176v-6a7 7 0 0 1 14 0v6" fill="none" stroke="#1a5c46" stroke-width="2"/>
  <text x="637" y="150" fill="#1a5c46" font-size="12" font-weight="700" letter-spacing="1.5" transform="rotate(90 637 150)">POLICY EDGE</text>
  <g stroke="#1a5c46" stroke-width="1.6" fill="none" marker-end="url(#arrow)" opacity=".85">
    <path d="M670 160 C 700 160 700 150 726 150"/>
    <path d="M670 250 C 700 250 700 258 726 258"/>
