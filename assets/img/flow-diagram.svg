    <text x="748" y="270" font-size="11.5">OpenAI</text><text x="820" y="270" font-size="11.5">Anthropic</text>
    <text x="748" y="296" font-size="11.5">Gemini</text><text x="820" y="296" font-size="11.5">open-source</text>
