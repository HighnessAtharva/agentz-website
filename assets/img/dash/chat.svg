<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace">
  <rect width="720" height="440" fill="#0f0f13"/>
  <rect x="0" y="0" width="720" height="46" fill="#141419"/>
  <line x1="0" y1="46" x2="720" y2="46" stroke="#26262e"/>
  <circle cx="26" cy="23" r="6" fill="#6aa9f0"/>
  <text x="42" y="28" fill="#e8e8ea" font-size="14" font-weight="500">agentz . chat</text>
  <text x="600" y="28" fill="#8b8b95" font-size="11">digest-agent</text>
  <!-- user bubble -->
  <rect x="300" y="70" width="392" height="46" rx="14" fill="#1c2740"/>
  <text x="320" y="90" fill="#dfe8f5" font-size="12.5">Edit the workflow: run it daily at</text>
  <text x="320" y="108" fill="#dfe8f5" font-size="12.5">12:30am and post the digest to Slack.</text>
  <text x="300" y="132" fill="#5c6a7a" font-size="10" text-anchor="start">you</text>
  <!-- agent bubble -->
  <rect x="28" y="150" width="470" height="132" rx="14" fill="#17171d" stroke="#2c2c36"/>
  <rect x="28" y="150" width="4" height="132" rx="2" fill="#3ec27f"/>
  <text x="48" y="176" fill="#e8e8ea" font-size="12.5">Done. I edited the publish step and set a</text>
  <text x="48" y="196" fill="#e8e8ea" font-size="12.5">schedule. Nothing else changed.</text>
  <rect x="48" y="210" width="360" height="26" rx="7" fill="#111116" stroke="#26262e"/>
  <text x="60" y="227" fill="#3ec27f" font-size="11.5">+ cron  0 30 0 * * *   . daily 12:30am</text>
  <rect x="48" y="242" width="360" height="26" rx="7" fill="#111116" stroke="#26262e"/>
  <text x="60" y="259" fill="#6aa9f0" font-size="11.5">~ publish.destination = slack://#ops</text>
  <text x="48" y="300" fill="#8b8b95" font-size="10">agent . claude . no redeploy needed</text>
  <!-- pills -->
  <rect x="28" y="316" width="150" height="26" rx="13" fill="#16341f" stroke="#245c39"/>
  <text x="46" y="333" fill="#3ec27f" font-size="11">schedule set . next 14h</text>
  <rect x="188" y="316" width="120" height="26" rx="13" fill="#1b1b22" stroke="#2c2c36"/>
  <text x="206" y="333" fill="#c7c7cf" font-size="11">workflow saved</text>
  <!-- composer -->
  <rect x="28" y="372" width="664" height="42" rx="12" fill="#131318" stroke="#2c2c36"/>
  <text x="46" y="398" fill="#5c5c66" font-size="12.5">Ask Agent Z to build, edit or schedule a run...</text>
  <rect x="640" y="380" width="38" height="26" rx="8" fill="#3ec27f"/>
  <path d="M652 393h13m0 0l-5-5m5 5l-5 5" stroke="#0f0f13" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
